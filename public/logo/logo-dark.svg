<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="mainGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="accentGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Icon Group -->
  <g transform="translate(60, 40) scale(0.625)">
    <circle cx="256" cy="256" r="240" fill="url(#mainGradDark)" filter="url(#glowDark)"/>
    <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    
    <path d="M 160 360 L 160 240 Q 160 130 256 130 Q 352 130 352 240 L 352 360" 
          fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
    <path d="M 160 360 L 160 240 Q 160 130 256 130 Q 352 130 352 240 L 352 360" 
          fill="none" stroke="url(#accentGradDark)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    
    <line x1="216" y1="360" x2="216" y2="190" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <line x1="296" y1="360" x2="296" y2="190" stroke="white" stroke-width="18" stroke-linecap="round"/>
    
    <text x="256" y="315" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" 
          font-weight="800" font-size="140" fill="white">G</text>
    
    <path d="M 256 80 L 268 110 L 300 110 L 274 130 L 284 160 L 256 142 L 228 160 L 238 130 L 212 110 L 244 110 Z" 
          fill="url(#accentGradDark)"/>
    
    <path d="M 120 180 Q 125 180 125 175 Q 125 180 130 180 Q 125 180 125 185 Q 125 180 120 180" fill="white" opacity="0.8"/>
    <path d="M 382 200 Q 387 200 387 195 Q 387 200 392 200 Q 387 200 387 205 Q 387 200 382 200" fill="white" opacity="0.6"/>
  </g>

  <text x="440" y="230" font-family="Cairo, system-ui, sans-serif" font-weight="800" font-size="160" 
        fill="url(#mainGradDark)" filter="url(#glowDark)">Gateo</text>
  <text x="445" y="295" font-family="Cairo, system-ui, sans-serif" font-weight="500" font-size="36" 
        fill="#94a3b8" letter-spacing="2">بوابة السيدات للجمال والأناقة</text>
  <line x1="440" y1="320" x2="720" y2="320" stroke="url(#accentGradDark)" stroke-width="4" stroke-linecap="round"/>
</svg>
