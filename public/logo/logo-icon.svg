<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#mainGrad)" filter="url(#shadow)"/>
  
  <!-- Inner subtle circle -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Gate arch (outer) -->
  <path d="M 160 360 L 160 240 Q 160 130 256 130 Q 352 130 352 240 L 352 360" 
        fill="none" stroke="white" stroke-width="28" stroke-linecap="round" filter="url(#innerShadow)"/>
  
  <!-- Gate arch (inner accent) -->
  <path d="M 160 360 L 160 240 Q 160 130 256 130 Q 352 130 352 240 L 352 360" 
        fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Vertical bars -->
  <line x1="216" y1="360" x2="216" y2="190" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="296" y1="360" x2="296" y2="190" stroke="white" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Center G letter -->
  <text x="256" y="315" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" 
        font-weight="800" font-size="140" fill="white" filter="url(#innerShadow)">G</text>
  
  <!-- Crown/Star on top -->
  <path d="M 256 80 L 268 110 L 300 110 L 274 130 L 284 160 L 256 142 L 228 160 L 238 130 L 212 110 L 244 110 Z" 
        fill="url(#accentGrad)" filter="url(#innerShadow)"/>
  
  <!-- Sparkle accents -->
  <path d="M 120 180 Q 125 180 125 175 Q 125 180 130 180 Q 125 180 125 185 Q 125 180 120 180" fill="white" opacity="0.8"/>
  <path d="M 382 200 Q 387 200 387 195 Q 387 200 392 200 Q 387 200 387 205 Q 387 200 382 200" fill="white" opacity="0.6"/>
  <circle cx="140" cy="320" r="4" fill="white" opacity="0.5"/>
  <circle cx="370" cy="300" r="3" fill="white" opacity="0.4"/>
</svg>
